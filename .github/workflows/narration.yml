name: Build and Deploy Moonlight Reader

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: [self-hosted, Windows, X64, aivis]
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Restore narration cache
        uses: actions/cache@v4
        with:
          path: public/assets/audio
          key: ${{ runner.os }}-aivis-${{ hashFiles('public/content/**', 'scripts/generate-audio.ts', 'scripts/windows/prepare-aivis.ps1') }}
          restore-keys: |
            ${{ runner.os }}-aivis-
      - name: Install dependencies
        shell: cmd
        run: npm.cmd ci
      - name: Validate authored content
        shell: cmd
        run: npm.cmd run validate:content
      - name: Run tests
        shell: cmd
        run: npm.cmd test
      - name: Prepare local AivisSpeech
        shell: cmd
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows\prepare-aivis.ps1
      - name: Generate changed narration
        env:
          AIVIS_ENGINE_URL: http://127.0.0.1:10101
          AIVIS_SPEAKER_NAME: 阿井田 茂
          AIVIS_SPEAKER_UUID: 561e4e59-3bc9-4726-9028-44a3c12a6f1d
          AIVIS_STYLE_NAME: Calm
          FFMPEG_PATH: C:\ffmpeg\bin\ffmpeg.exe
        shell: cmd
        run: npm.cmd run generate:audio
      - name: Build site with narration
        shell: cmd
        run: npm.cmd run build
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Archive Pages artifact
        shell: cmd
        run: tar.exe --directory dist -cvf "%RUNNER_TEMP%\artifact.tar" .
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}\artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
