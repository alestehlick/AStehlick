name: Generate Moonlight Reader Narration

on:
  push:
    branches: [main, master]
    paths:
      - "public/content/**"
      - "scripts/generate-audio.ts"
      - "scripts/windows/prepare-aivis.ps1"
      - "scripts/windows/commit-audio.ps1"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/narration.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: moonlight-reader-narration
  cancel-in-progress: false

jobs:
  narrate:
    runs-on: [self-hosted, Windows, X64, aivis]
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: cmd
        run: npm.cmd ci
      - name: Validate authored content
        shell: cmd
        run: npm.cmd run validate:content
      - name: Prepare local AivisSpeech
        shell: cmd
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows\prepare-aivis.ps1
      - name: Generate changed narration
        env:
          AIVIS_ENGINE_URL: http://127.0.0.1:10101
          AIVIS_SPEAKER_NAME: 阿井田 茂
          AIVIS_STYLE_NAME: Calm
          FFMPEG_PATH: C:\ffmpeg\bin\ffmpeg.exe
        shell: cmd
        run: npm.cmd run generate:audio
      - name: Commit refreshed narration
        shell: cmd
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows\commit-audio.ps1
